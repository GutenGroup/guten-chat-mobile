name: guten_chat
description: >-
  Guten Chat Mobile — the shared Flutter chat package for Guten Group apps
  (Instant Capture / Techpool, Cowbolt, Fysigo-mobile). Flutter sibling of
  Guten Chat Web (@gutengroup/chat-*). Talks to the SAME Supabase chat schema,
  so a message is the same conversation on web and mobile.
version: 0.5.0
publish_to: none
repository: https://github.com/GutenGroup/guten-chat-mobile

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.8.0
  intl: ^0.19.0
  equatable: ^2.0.7
  flutter_bloc: ^9.1.0
  uuid: ^4.5.1
  collection: ^1.19.0
  image_picker: ^1.1.0
  file_picker: ^8.0.0
  webview_flutter: ^4.7.0
  pdfx: ^2.8.0
  path: ^1.9.0
  flutter_sound: ^9.28.0
  path_provider: ^2.1.5
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
